<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./weather_style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=water_drop" />
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="search-box">
                <input type="text" placeholder="Enter Location" class="input-box">
                <button id="searchbtn">🔍</button>
            </div>
        </div>

        <div class="location-not-found">
            <h1>sorry,location not found!!</h1>
            <img src="./404.png" alt="404 error">
        </div>
        <div class="weather-body">
            <img src="./weather1-Photoroom.jpg" alt="Weather_image" class="weather-img">
        </div>
        <div class="weather-box">
            <p class="temperature">0 <sup>℃</sup></p>
            <p class="description">Light Rain</p>
        </div>
        <div class="weather-details">
            <div class="humidity">
                <i>💧</i>
                <div class="text">
                    <span id="humidity">45%</span>
                    <p>Humidity</p>
                </div>
            </div>

            <div class="wind">
            <div class="humidity">
                <i>💨</i>
                <div class="text">
                    <span id="wind-speed">12km/hr</span>
                    <p>wind speed</p>
                </div>
            </div>
        </div>
        </div>
    </div>

    <script src="./weather_js.js"></script>
</body>
</html>
